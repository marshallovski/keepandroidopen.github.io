# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "Кого це стосується"

# [en] impact_you_heading: "You"
impact_you_heading: "Вас"

# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Ви придбали телефон на Android, бо Google запевняв, що ця платформа є відкритою. Ви могли встановлювати все, що забажаєте - ось у чому полягала суть."

# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: "Зараз Google переглядає умови цієї угоди, поширюючи їх на пристрої, яке ви вже маєте. Після оновлення ви зможете використовувати лише ті додатки, яке попередньо схвалила Google. На *вашому* телефоні - вашій власності, за яку ви *заплатили*."

# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Незалежні розробників"

# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "Перший додаток підлітка, інструмент для захисту приватності, створений волонтером, чи конфіденційна внутрішня бета-версія додатку компанії. Не має значення. Після вересня 2026 року жоден із них не можна буде встановити без дозволу Google."

# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: "[F-Droid](https://f-droid.org), доміка для тисячі вільних та відкритих додатків для Android, назвала це [загрозою існування](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Корі Докторов називає її [\"Дарт-Android\"](https://pluralistic.net/2025/09/01/fulu/)."


# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Урядів та громадських організацій"

# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: "Компанія Google має [документально підтверджену практику](https://www.aclu.org/news/free-speech/app-store-oligopoly) виконання вимог авторитарних режимів щодо видалення додатків. У рамках цієї програми, програмне забезпечення, на якому працюють державні установи вашої країни, буде залежати від примх однієї-єдиної іноземної корпорації, яка не несе жодної відповідальності."


# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: "[EFF називає](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) контроль доступу до додатків «шляхом, що постійно розширюється до цензури в Інтернеті»."


# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "«Шлях до порятунку» від Google виявився пасткою"

# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: "Google заявляє, що «досвідчені користувачі» можуть [«як і раніше» встановлювати](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) неперевірені програми. Ось як це *насправді* виглядає:"

# [en] flow_step1: "Delve into System Settings, find Developer Options"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
# [en] flow_step3: "Dismiss scare screens about coercion"
# [en] flow_step4: "Enter your PIN"
# [en] flow_step5: "Restart the device"
# [en] flow_step6: "**Wait 24 hours**"
# [en] flow_step7: "Come back, dismiss more scare screens"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"

flow_step1: "Зайдіть у налаштування системи та знайдіть розділ «Параметри розробника»"
flow_step2: "Натисніть на номер збірки **сім разів**, щоб увімкнути режим розробника"
flow_step3: "Закрийте попереджувальні екрани про змушення"
flow_step4: "Введіть свій PIN-код"
flow_step5: "Перезапустіть пристрій"
flow_step6: "Зачекайте **24 години**"
flow_step7: "Поверніться, закрийте інші попереджувальні екрани"
flow_step8: "Виберіть «дозволити тимчасово» (7 днів) або «дозволити безстроково»"
flow_step9: "Ще раз підтвердьте, що ви розумієте «ризики»"
flow_summary: "Дев'ять кроків. Обов'язковий 24-годинний період очікування. *Для встановлення додатків на пристрій, який належить вам.*"

# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: "Гірше того: цей алгоритм повністю працює через **Сервіси Google Play**, а не через ОС Android. Google може його змінити, посилити або взагалі вимкнути в будь-який момент, без необхідності оновлення ОС та без будь-якої згоди. І на сьогоднішній день він не був реалізований у жодній бета-, попередній або тестовій версії. Він існує лише у вигляді публікації в блозі та кількох макетів."


# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "Це більше, ніж просто Android"

# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Якщо Google вдасться просто взяти і заблокувати мільярди пристроїв, які обіцяли бути відкритими, - це стане сигналом для кожного виробника обладнання у світі."

# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: "Встановлюється принцип: компанія-виробник вашого пристрою одноосібно вирішує вже після покупки, яке програмне забезпечення вам дозволено запускати. У індустрії це називають «вибиванням ґрунту з-під ніг» (rug pull); але там ви принаймні завжди могли встановити програмне забезпечення від конкурентів. У випадку з «залізом» - це *fait accompli* (доконаний факт), який позбавляє вас суб'єктності та робить безсилими перед примхами єдиного непідзвітного контролера доступу та визнаного монополіста."


# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: "Відкритість Android ніколи не була просто однією з функцій. Це була *обіцянка*, яка відрізняла його від iPhone. Саме з цієї причини мільйони людей обрали Android. Зараз Google в односторонньому порядку порушує цю обіцянку щодо пристроїв, які *вже* знаходяться у кишенях користувачів, оскільки компанія вирішила, що її домінування на ринку та вплив на регуляторні органи достатні, щоб уникнути відповідальності."

# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *«Заздрість Google до Apple загрожує зруйнувати традиції відкритості Android.»*"

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Зачекайте, але це не..."

# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "«...просто про безпеку?»"

# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: "Аргументи щодо безпеки - це лише прикриття. Google Play Protect і так перевіряє програми на наявність шкідливого ПЗ незалежно від особи розробника. Вимога надати паспорт не робить код безпечнішим. Це робить *розробників* ідентифікованими та контрольованими. Автори шкідливих додатків можуть зареєструватися. Незалежні розробники та незгодні часто не можуть. [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) висловлюється прямо: контроль на основі ідентифікації є інструментом цензури, а не безпеки."

# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "«...все те ж встановлення зі сторонніх джерел, якщо йти складнішим шляхом?»"

# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: "Дев'ять кроків, 24-годинне очікування, все це заховано глибоко в налаштуваннях для розробників і надається через пропрієтарний сервіс, який Google може відкликати будь-коли. Це не сайдлоадинг. Це механізм стримування, створений для того, щоб його майже ніхто не пройшов до кінця. А оскільки він працює через Сервіси Google Play, а не через сам Android, Google може посилити обмеження або просто «вбити» його без жодного шуму."

# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "«...проблема лише для тих, кому є що приховувати?»"

# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: "Першими жертвами стануть викривачі корупції, журналісти та активісти в країнах з авторитарними режимами. Наступними - люди, що опинилися в ситуаціях домашнього насильства. Усі ці групи мають законні підстави поширювати або використовувати додатки, не вносячи свої особисті дані до бази Google. Традиція анонімного внеску у відкритий код старіша за саму компанію Google. Ця політика ставить на ній хрест в екосистемі Android."

# [en] obj_apple_q: "\"...the same thing Apple does?\"" 
obj_apple_q: "«...те саме, що робить Apple?»"

# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status." 
obj_apple_a: "Apple була «огородженим садом» з першого дня. Люди обирали Android саме за те, що він був іншим. Аргумент «Apple робить так само» - це шлях у нікуди та слабке виправдання за принципом tu quoque (сам такий). Більше того, під тиском регуляторів (зокрема Закону ЄС про цифрові ринки) навіть Apple змушена погоджуватися. Google же рухається у зворотному напрямку: намагається ще сильніше закріпити свій статус контролера доступу."

# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "«...всього лише 25 доларів і трохи паперової тяганини?»"

# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: "Можливо, якщо ви розробник у США з кредитною карткою та водійським посвідченням. Але спробуйте бути студентом у країнах Африки на південь від Сахари, дисидентом у М'янмі або волонтером, який підтримує додаток для місцевої громади. Ціна тут не лише фінансова: ви передаєте копію свого державного посвідчення особи та дані про ключі підпису компанії, яка [регулярно виконує](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) вимоги урядів щодо видалення додатків та деанонімізації розробників."


