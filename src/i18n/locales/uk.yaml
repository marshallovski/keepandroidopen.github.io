# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} # [en]KeepAndroidOpen"
social_callout_linkedin_2: "Прозорість Android є його відмінною рисою вже майже 20 років. Тепер Google вводить обов'язкову реєстрацію розробників для всіх додатків Android, включаючи ті, що розповсюджуються через альтернативні магазини, такі як F-Droid. EFF, FSF, Tor Project та десятки інших організацій висловлюють серйозну стурбованість. {url} # [en]KeepAndroidOpen"

# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} # [en]KeepAndroidOpen"
social_callout_linkedin_3: "Програма Google з верифікації розробників надасть одній компанії технічну можливість блокувати будь-який додаток від будь-якого розробника на будь-якому сертифікованому пристрої Android у всьому світі. Це зачіпає інтереси незалежних розробників, проєктів з відкритим кодом, а також принцип, згідно з яким ви самі керуєте додатками на своєму пристрої. {url} # [en]KeepAndroidOpen"

# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} # [en]KeepAndroidOpen"
