# [en] what_heading: "What Google is doing"
what_heading: "Що Google робить"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: |
  В серпні 2025, Google [оголосив](https://developer.android.com/developer-verification) нові вимоги: починаючи із вересня 2026, **кожен розробник Android додатків має зареєструватись
  в централізованій системі Google**, перед тим як їхнє програмне забезпечення зможе бути встановленим на будь-який пристрій. Не лише для Play Store додатків: для всіх додатків. Це включає додатки поширювані між друзями, розповсюджувані
  через [F-Droid](https://f-droid.org), створені ентузіастами для власного використання. Незалежні розробники, церковні і громадські організації, ентузіасти будуть позбавлені можливості розробляти і розповсюджувати свої програми.
