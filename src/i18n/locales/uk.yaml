# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} # [en]KeepAndroidOpen"
social_callout_linkedin_5: "Запропонований Google «розширений алгоритм» для встановлення неперевірених додатків вимагає виконання 9 кроків, обов'язкового 24-годинного періоду очікування та повністю реалізується через Google Play Services. Спільноті було запропоновано сприймати публікацію в блозі як дієвий запобіжний захід. Ця функція не з'явилася в жодній бета-версії. {url} # [en]KeepAndroidOpen"

# [en] social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps—even those distributed outside the Play Store—creates a central point of control and potential censorship for 3 billion devices. {url} # [en]KeepAndroidOpen"
social_callout_linkedin_6: "Цифровий суверенітет перебуває під загрозою. План Google щодо обов'язкової реєстрації розробників для всіх додатків Android - навіть тих, що розповсюджуються поза Play Store - створює центральну точку контролю та потенційне цензурування для 3 мільярдів пристроїв. {url} # [en]KeepAndroidOpen"

# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} # [en]KeepAndroidOpen"
